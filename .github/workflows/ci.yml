name: CI

on:
  push:
    branches:
      - main
      - 'automation/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Ensure Android SDK
        run: bash scripts/ci/ensure-android-sdk.sh

      - name: Verify and build candidate debug artifact
        env:
          ARTIFACT_OUTPUT_DIR: artifacts/ci-candidate-debug
        run: bash scripts/ci/build-channel.sh candidate debug

      - name: Publish candidate debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: candidate-debug-${{ github.sha }}
          path: artifacts/ci-candidate-debug/
          if-no-files-found: error
          retention-days: 30

      - name: Write summary
        if: always()
        run: |
          if [[ -s artifacts/ci-candidate-debug/artifact-manifest.json ]]; then
            {
              echo '## Candidate debug artifact'
              echo
              echo '```json'
              cat artifacts/ci-candidate-debug/artifact-manifest.json
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
