name: Bug report
description: Report a reproducible Android app problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include private molecular structures, credentials, medical data, or other confidential files. Use the private security-reporting path for suspected vulnerabilities.
  - type: input
    id: version
    attributes:
      label: App version or commit
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: "Pixel 8, Android 16"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Use a minimal public or synthetic file when a file is required.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics or screenshots
      description: Redact private paths and data before attaching anything.
