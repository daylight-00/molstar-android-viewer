name: Feature request
description: Propose an Android integration or maintenance improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        This project intentionally keeps Mol* as the molecular product layer. Requests that change molecular formats, rendering, representations, or Viewer behavior should normally be proposed upstream unless they are specifically about Android integration.
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: Describe the concrete Android user or maintainer problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Most relevant layer
      options:
        - Android file or sharing integration
        - Android lifecycle, WebView, theme, or system UI
        - Build, CI, update, or release automation
        - Minimal mobile customization policy
        - Upstream Mol* behavior
        - Unsure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I understand that upstream Mol* JavaScript, CSS, and molecular behavior are not patched in this repository.
          required: true
