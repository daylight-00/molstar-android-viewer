<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' data: blob: https:; connect-src 'self' data: blob: https:; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; worker-src 'self' blob:; object-src 'none'; base-uri 'none'">
    <title>Mol* Android Viewer</title>
    <link id="molstar-theme-light" rel="stylesheet" href="vendor/molstar/molstar.css">
    <link id="molstar-theme-dark" rel="stylesheet" href="vendor/molstar/theme/dark.css" disabled>
    <script src="theme-controller.js"></script>
    <style>
        :root {
            --host-background: #f7f7f8;
            --host-foreground: #202124;
            --host-error: #b3261e;
        }

        :root[data-theme="dark"] {
            --host-background: #101418;
            --host-foreground: #e8eaed;
            --host-error: #ffb4ab;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--host-background);
        }

        #app {
            position: absolute;
            inset: 0;
        }

        #custom-ui-root {
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
        }

        #custom-ui-root:empty {
            display: none;
        }

        #boot-status {
            position: absolute;
            inset: 0;
            z-index: 2147483647;
            display: grid;
            place-items: center;
            padding: 24px;
            box-sizing: border-box;
            color: var(--host-error);
            background: var(--host-background);
            font: 16px/1.5 sans-serif;
            text-align: center;
            white-space: pre-wrap;
        }

        #boot-status[hidden] {
            display: none;
        }
    </style>
</head>
<body>
<div id="app"></div>
<div id="custom-ui-root"></div>
<div id="boot-status" role="alert" aria-live="assertive" hidden></div>
<script src="boot-diagnostics.js"></script>
<script src="vendor/molstar/molstar.js"></script>
<script src="customization.js"></script>
<script src="app-bridge.js"></script>
</body>
</html>
