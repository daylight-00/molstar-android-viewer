<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' data: blob: https:; connect-src 'self' data: blob: https:; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; worker-src 'self' blob:; object-src 'none'; base-uri 'none'">
    <title>Mol* Android Viewer</title>
    <link rel="stylesheet" href="vendor/molstar/molstar.css">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #101418;
        }

        #app {
            position: absolute;
            inset: 0;
        }

        #boot-status {
            position: absolute;
            inset: 0;
            z-index: 2147483647;
            display: grid;
            place-items: center;
            padding: 24px;
            box-sizing: border-box;
            color: #e8eaed;
            background: #101418;
            font: 16px/1.5 sans-serif;
            text-align: center;
            white-space: pre-wrap;
        }

        #boot-status[data-state="error"] {
            color: #ffb4ab;
        }

        #boot-status[hidden] {
            display: none;
        }
    </style>
</head>
<body>
<div id="app"></div>
<div id="boot-status" data-state="loading" role="status">Starting Mol*…</div>
<script src="boot-diagnostics.js"></script>
<script src="vendor/molstar/molstar.js"></script>
<script src="app-bridge.js"></script>
</body>
</html>
